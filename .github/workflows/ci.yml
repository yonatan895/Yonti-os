name: CI

on:
  pull_request:
    branches: [master]
    paths-ignore:
      - '**.md'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: "fmt"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rustfmt
      - name: Check kernel formatting
        run: cargo fmt --all -- --check
      - name: Check runner formatting
        run: cd runner && cargo fmt -- --check

  clippy:
    name: "clippy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: clippy, rust-src
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
            runner/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-
      - name: Cargo clippy (kernel)
        run: |
          cargo build --target x86_64-unknown-none
          cargo clippy --target x86_64-unknown-none -- -D warnings
        working-directory: kernel
      - name: Cargo clippy (runner)
        run: SKIP_KERNEL_BUILD=1 cargo clippy --no-default-features -- -D warnings
        working-directory: runner

  deny:
    name: "deny"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Check workspace dependencies
        run: cargo deny check
      - name: Check runner dependencies
        run: cd runner && cargo deny check

  build-and-test:
    name: "build + test"
    needs: [fmt, clippy, deny]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: rust-src, llvm-tools-preview
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
            runner/target/
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-
      - name: Install QEMU
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q qemu-system-x86
      - name: Build test-runner (also builds kernel ELF via build.rs)
        run: cargo build --no-default-features --bin test-runner
        working-directory: runner
      - name: Build test ELFs
        run: cargo build --tests --target x86_64-unknown-none
        working-directory: kernel
      - name: Upload boot images
        uses: actions/upload-artifact@v7
        with:
          name: boot-images
          path: runner/target/boot-images/
          retention-days: 7
      - name: Run tests
        run: |
          export CI=true
          export TIMEOUT=120
          ./run_tests.sh
